name: Get TIPS Yields

# FedInvest publishes prices once daily at ~1pm ET, Mon-Fri (non-holidays).
# ET = UTC-4 (EDT, Mar–Nov); cron runs at 17:00 UTC = 1:00 PM EDT.

on:
  schedule:
    - cron: '0 17 * * 1-5'   # 1:00 PM EDT (UTC-4)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Get TIPS yields
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: node scripts/getTipsYields.js
